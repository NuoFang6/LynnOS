name: R2S-ImmortalWrt

on:
  #  schedule:
  #    - cron: 5 6 * * 0
  workflow_dispatch:
    inputs:
      dev:
        description: "使用开发版编译"
        type: boolean
        required: true
        default: true
  watch:
    types: started

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: 检查运行硬件
        run: |
          echo -e "Total CPU cores\t: $(nproc)"
          cat /proc/cpuinfo | grep 'model name'
          cpu_name=$(cat /proc/cpuinfo | grep "model name" | head -n 1 | awk -F: '{print $2}' | sed 's/^[ \t]*//')
          if [[ "$cpu_name" =~ "8370C" || "$cpu_name" =~ "7763" ]]; then
            echo "CPU为8370C或7763，继续运行"
          else
            echo "CPU不为8370C或7763，性能可能不足，停止运行"
            exit 1
          fi

      - name: 最大化储存空间
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 512
          temp-reserve-mb: 128
          root-reserve-mb: 3072
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: 克隆代码
        uses: actions/checkout@main

      - name: 准备编译环境
        env:
          # 无交互安装
          DEBIAN_FRONTEND: noninteractive
          # 依赖
          DEPENDENCY: ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        # -E 表示传递环境变量
        run: |
          if ${{ inputs.dev }}
          then
            echo "branch=master" >> $GITHUB_ENV
          else
            echo "branch=openwrt-23.05" >> $GITHUB_ENV
          fi
          sudo swapoff -a &
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc && sudo -E add-apt-repository -y ppa:apt-fast/stable && sudo -E apt-get install -y apt-fast && sudo -E apt-fast -y -qq install ${{ env.DEPENDENCY }} && sudo -E apt-get -qq autoremove --purge && sudo -E apt-get -qq clean
          wait
          sudo -E git config --global user.name 'GitHub Actions' && git config --global user.email 'noreply@github.com' && sudo -E git config --global core.abbrev auto

      - name: 克隆 ImmortalWrt 仓库
        uses: actions/checkout@main
        with:
          repository: "immortalwrt/immortalwrt"
          ref: ${{env.branch}}
          path: ImmortalWrt
          fetch-depth: 0

      - name: 构建缓存
        uses: HiGarfield/cachewrtbuild@main
        with:
          ccache: true
          toolchain: true
          mixkey: "r2s"
          prefix: ${{ github.workspace }}/ImmortalWrt

      - name: 运行自定义脚本
        working-directory: ./ImmortalWrt
        run: |
          sudo chown -R runner:runner /home/runner/work/$(basename ${{ github.repository }})
          cp -r ../SCRIPTS/. ./
          /bin/bash 01_prepare_package.sh
          /bin/bash 02_target_R2S.sh
          /bin/bash 03_create_acl_for_luci.sh -a
          wait

      - name: 编译 MyImmortalWrt
        id: compileImmortalWrt
        continue-on-error: true
        working-directory: ./ImmortalWrt
        run: |
          make download -j50
          IGNORE_ERRORS=1 make -j$(($(nproc) + 1))
          echo $?

      - name: debug 压缩目录文件
        continue-on-error: true
        if: steps.compileImmortalWrt.outcome == 'failure'
        run: |
          zstd -15 -r -o ./ImmortalWrt-End.zst ./ImmortalWrt/

      - name: debug 上传压缩目录文件
        continue-on-error: true
        if: steps.compileImmortalWrt.outcome == 'failure'
        uses: actions/upload-artifact@main
        with:
          compression-level: 0
          name: ImmortalWrt-End
          path: ImmortalWrt-End.zst

      - name: debug 详细模式编译
        if: steps.compileImmortalWrt.outcome == 'failure'
        working-directory: ./ImmortalWrt
        run: |
          echo '===== 项目目录结构 ====='
          ls ..
          echo '===== ImmortalWrt目录结构 ====='
          ls
          echo '===== 当前 .config 内容 ====='
          cat .config
          echo '===== 开始 Debug 模式编译 ======'
          make -j1 V=s

      - name: 编译完成，打包镜像
        run: |
          mkdir -p ./output/img/
          for file in ./ImmortalWrt/bin/targets/rockchip/armv8/*; do
            zstd -11 --rm -o ./output/img/$(basename "$file").zst $file
          done
          zstd -15 -r -o ./ImmortalWrt-End.zst ./ImmortalWrt/ &
          mkdir -p ./output/sha256sums/
          for file in ./output/img/*; do
            sha256sum "$file" > ./output/sha256sums/$(basename "$file")-sha256.txt
          done
          zstd -11 --rm -r -o ./output/sha256sums.zst ./output/sha256sums/
          wait
          zstd -11 -r -o ./output.zst ./output
          ls -Ahl ./output
          echo '===== 储存空间状态 ======'
          df -h

      - name: 上传至 artifact
        uses: actions/upload-artifact@main
        with:
          name: Output
          compression-level: 0
          path: |
            output.zst
            ImmortalWrt-End.zst

      - name: 创建发行版
        uses: ncipollo/release-action@main
        with:
          name: MyImmortalWrt-R2s
          allowUpdates: true
          prerelease: false
          tag: R2s
          commit: ImmortalWrt-${{inputs.branch}}
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: output/**
