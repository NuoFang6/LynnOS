name: R2S-LynnOS

on:
  schedule:
    - cron: 00 17 * * 5
    # 北京时间(UTC+8) 星期六早上 1:00
  push:
    branches:
      - "main"
    paths:
      - "SCRIPTS/01_prepare_package.sh"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      build:
        description: "进行编译"
        type: boolean
        default: true
        required: true

jobs:
  Build:
    runs-on: "ubuntu-22.04"
    env:
      TAG: r2s
      CURRENT_TIME: "2024"
      TERM: xterm
      # 无交互
      DEBIAN_FRONTEND: noninteractive
    steps:
      - name: 最大化储存空间
        uses: easimon/maximize-build-space@master
        if: inputs.build == true || github.event.schedule
        with:
          swap-size-mb: 1
          temp-reserve-mb: 100
          root-reserve-mb: 4096
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: 克隆代码
        uses: actions/checkout@main
        with:
          ref: main
          fetch-depth: 1

      - name: 准备编译环境
        env:
          # 依赖
          DEPENDENCY: ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
        # -E 表示传递环境变量
        run: |
          {
            sudo swapoff -a &
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc &
            sudo rm -rf /etc/apt/sources.list.d/*
            /bin/bash -c "$(curl -sL https://git.io/vokNn)"
            sudo -E cp -rf ./apt-fast.conf /etc
            sudo -E apt-fast -qq update -y
            sudo -E apt-fast -qq dist-upgrade -y
            sudo -E apt-fast -qq install -y $DEPENDENCY
            sudo -E apt-fast -qq autoremove --purge -y
            sudo -E apt-fast -qq clean -y
            sudo -E git config --global user.name 'GitHub Actions'
            sudo -E git config --global user.email 'noreply@github.com'
            sudo -E git config --global core.abbrev auto
          } >/dev/null
          wait
          git clone -b master --depth 1 https://github.com/immortalwrt/immortalwrt.git ./ImmortalWrt >/dev/null

      - name: 运行自定义脚本
        run: |
          pushd ./ImmortalWrt
          cp -r ../SCRIPTS/. ./
          bash 01_prepare_package.sh
          bash 02_target_R2S.sh
          bash 03_create_acl_for_luci.sh -a
          wait && popd
          make defconfig
          tar -cf - ./ImmortalWrt/ | zstd -19 -T0 -o ./ImmortalWrt-End.tar.zst
          sudo df -h

      - name: 恢复缓存
        if: inputs.build == true || github.event.schedule
        uses: HiGarfield/cachewrtbuild@main
        with:
          ccache: true
          toolchain: true
          skip: true
          mixkey: "r2s"
          prefix: ${{ github.workspace }}/ImmortalWrt

      - name: 编译 LynnOS
        if: inputs.build == true || github.event.schedule
        id: build
        continue-on-error: true
        working-directory: ./ImmortalWrt
        env:
          IGNORE_ERRORS: 1
        run: |
          make download -j50
          make -j$(($(nproc) + 1))

      - name: debug 详细日志编译
        if: steps.build.outcome == 'failure'
        continue-on-error: true
        working-directory: ./ImmortalWrt
        run: |
          make -j1 V=s

      - name: 编译完成，打包镜像
        if: steps.build.outcome == 'success'
        working-directory: ./ImmortalWrt/bin/targets/rockchip/armv8/
        run: |
          tar -cf - ./packages --remove-files | zstd -19 -T0 -o ./packages.tar.zst
          cd ..
          tar -cf - ./armv8 | zstd -19 -T0 -o ./output.tar.zst
          cp -rf ./output.tar.zst ./armv8
          echo "CURRENT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
          echo "TAG=v$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV
          df -h

      - name: 上传至 artifact
        uses: actions/upload-artifact@main
        continue-on-error: true
        with:
          name: Output
          if-no-files-found: warn
          compression-level: 0
          path: |
            ImmortalWrt-End.tar.zst
            ImmortalWrt/bin/targets/rockchip/armv8/output.tar.zst

      - name: 创建发行版
        if: steps.build.outcome == 'success'
        uses: ncipollo/release-action@main
        continue-on-error: true
        with:
          name: LynnOS-R2S
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: false
          commit: main
          tag: "Success-${{ env.TAG }}"
          body: "${{ env.CURRENT_TIME }} 自动发布 LynnOS-R2S"
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ImmortalWrt/bin/targets/rockchip/armv8/*

  # clean:
  #   needs: Build
  #   uses: ./.github/workflows/Cleaning.yml
